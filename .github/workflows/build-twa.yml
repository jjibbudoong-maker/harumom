name: Build TWA (Android AAB)

on:
  workflow_dispatch:    # 수동 실행
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-twa.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/harumom-release.keystore

      - name: Initialize Bubblewrap project
        run: |
          cd android
          bubblewrap init \
            --manifest https://apeuni.vercel.app/manifest.json \
            --directory . \
            < /dev/null || true

      - name: Copy twa-manifest
        run: cp android/twa-manifest.json android/twa-manifest.json || true

      - name: Build AAB
        run: |
          cd android
          bubblewrap build \
            --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: harumom-release-aab
          path: android/app-release-bundle.aab
          retention-days: 7
